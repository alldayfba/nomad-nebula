<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>247profits — Sourcing Matrix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
        .badge-buy { background: rgba(52, 211, 153, 0.1); color: var(--success); font-weight: 800; }
        .badge-maybe { background: rgba(255, 149, 0, 0.1); color: var(--warning); font-weight: 800; }
        .badge-skip { background: rgba(0,0,0,0.05); color: var(--text-secondary); font-weight: 800; }
        
        .mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: none; }
        .mode-tab { 
            padding: 0.75rem 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02); color: var(--text-secondary); white-space: nowrap;
            font-size: 0.85rem; font-weight: 600; transition: var(--transition);
        }
        .mode-tab:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
        .mode-tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px rgba(0, 113, 227, 0.2); }

        .form-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; align-items: end; }
        .settings-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 1.5rem; }
        
        .field label { display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        
        .progress-indicator { display: flex; align-items: center; gap: 1rem; margin-top: 2rem; padding: 1rem; background: rgba(0, 113, 227, 0.05); border-radius: var(--radius-sm); border: 1px solid rgba(0, 113, 227, 0.1); }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--glass-border); }
        .step-active .step-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .step-done .step-dot { background: var(--success); }

        .verdict-buy { background: rgba(52, 211, 153, 0.02); }
        .verdict-maybe { background: rgba(255, 149, 0, 0.02); }
        .verdict-skip { opacity: 0.6; }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="container" style="padding: 4rem 0;">
        <header style="margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <div class="logo" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <circle cx="16" cy="16" r="14" stroke="url(#logo-grad)" stroke-width="2.5" />
                        <circle cx="16" cy="16" r="6" fill="url(#logo-grad)" />
                        <defs>
                            <linearGradient id="logo-grad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#0071e3" />
                                <stop offset="100%" stop-color="#5e5ce6" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="text-gradient">247profits</span>
                </div>
                <h1 style="font-size: 3rem; margin-bottom: 0.5rem;">Sourcing Matrix</h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">High-fidelity Amazon FBA product harvesting system.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <a href="/stalker" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-primary);">Entity Monitor</a>
                <a href="/audit" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-primary);">Audit Engine</a>
            </div>
        </header>

        <!-- Mode Navigation -->
        <nav class="mode-tabs">
            <button class="mode-tab active" data-mode="search" onclick="switchMode('search')">Product Search</button>
            <button class="mode-tab" data-mode="url" onclick="switchMode('url')">URL Harvesting</button>
            <button class="mode-tab" data-mode="clearance" onclick="switchMode('clearance')">Clearance Radar</button>
            <button class="mode-tab" data-mode="brand" onclick="switchMode('brand')">Brand Extraction</button>
            <button class="mode-tab" data-mode="oos" onclick="switchMode('oos')">OOS Arbitrage</button>
            <button class="mode-tab" data-mode="deals" onclick="switchMode('deals')">Neural Drop Feed</button>
            <button class="mode-tab" data-mode="a2a" onclick="switchMode('a2a')">A2A Flips</button>
            <button class="mode-tab" data-mode="finder" onclick="switchMode('finder')">Opportunity Discovery</button>
            <button class="mode-tab" data-mode="wholesale" onclick="switchMode('wholesale')">Wholesale Matrix</button>
            <button class="mode-tab" data-mode="history" onclick="switchMode('history')">Transmission History</button>
        </nav>

        <section class="glass card" style="padding: 2.5rem; margin-bottom: 3rem;">
            <!-- SEARCH MODE -->
            <div id="mode-search" class="search-panel">
                <div class="form-grid">
                    <div class="field">
                        <label>Target Product Name</label>
                        <input id="search-query" type="text" placeholder="e.g. reeses easter eggs, protein powder, dewalt drill..." style="width: 100%;" />
                    </div>
                    <button id="search-btn" class="btn btn-primary" onclick="startMultiSearch()" style="width: 100%;">Initialize Search</button>
                </div>
                <div class="settings-row">
                    <div class="field">
                        <label>Category Logic</label>
                        <select id="search-category" style="width: 100%;">
                            <option value="">Auto-detect</option>
                            <option value="Grocery">Grocery</option>
                            <option value="Health">Health</option>
                            <option value="Beauty">Beauty</option>
                            <option value="Electronics">Electronics</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Retailer Nodes</label>
                        <select id="search-max-retailers" style="width: 100%;">
                            <option value="5">5 Centers</option>
                            <option value="10" selected>10 Centers</option>
                            <option value="15">15 Centers</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>ROI Threshold %</label>
                        <input id="search-min-roi" type="number" value="30" style="width: 100%;" />
                    </div>
                    <div class="field">
                        <label>Max Acquisition $</label>
                        <input id="search-max-price" type="number" value="50.00" style="width: 100%;" />
                    </div>
                </div>
            </div>

            <!-- URL MODE -->
            <div id="mode-url" class="search-panel hidden">
                <div class="form-grid">
                    <div class="field">
                        <label>Direct Retail Source URL</label>
                        <input id="source-url" type="url" placeholder="https://www.walmart.com/browse/clearance/..." style="width: 100%;" />
                    </div>
                    <button id="source-btn" class="btn btn-primary" onclick="startSourcing()" style="width: 100%;">Scrape Source</button>
                </div>
                <div class="settings-row">
                    <div class="field">
                        <label>Min ROI %</label>
                        <input id="min-roi" type="number" value="30" style="width: 100%;" />
                    </div>
                    <div class="field">
                        <label>Min Profit $</label>
                        <input id="min-profit" type="number" value="3.00" style="width: 100%;" />
                    </div>
                    <div class="field">
                        <label>Extraction Limit</label>
                        <select id="max-products">
                            <option value="20">20 Units</option>
                            <option value="50" selected>50 Units</option>
                            <option value="100">100 Units</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="progress-area" class="progress-indicator hidden">
                <div class="step-dot"></div>
                <div style="flex: 1; font-size: 0.85rem; font-weight: 600;" id="status-text">Ready for operation...</div>
                <button class="btn" style="font-size: 0.7rem; padding: 0.3rem 0.6rem;">Abort</button>
            </div>
        </section>

        <!-- Output matrix -->
        <section class="glass card" style="padding: 2.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3>Active Intelligence Feed</h3>
                <button class="btn" onclick="exportCSV()" disabled id="export-btn" style="font-size: 0.75rem; padding: 0.4rem 1.25rem;">Broadcast to CSV</button>
            </div>
            
            <div class="table-wrapper">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 1px solid var(--glass-border);">
                            <th style="padding: 1rem;">Asset Information</th>
                            <th style="padding: 1rem;">Retail Node</th>
                            <th style="padding: 1rem;">Cost</th>
                            <th style="padding: 1rem;">ROI %</th>
                            <th style="padding: 1rem;">Net Profit</th>
                            <th style="padding: 1rem; text-align: center;">Confidence</th>
                            <th style="padding: 1rem; text-align: right;">Verdict</th>
                        </tr>
                    </thead>
                    <tbody id="sourcing-tbody">
                        <tr><td colspan="7" style="padding: 4rem; text-align: center; color: var(--text-secondary);">Initializing neural sourcing feed...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let isRunning = false;
        let eventSource = null;

        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-mode') === mode));
            document.querySelectorAll('.search-panel').forEach(p => p.classList.add('hidden'));
            const panel = document.getElementById('mode-' + mode);
            if (panel) panel.classList.remove('hidden');
        }

        async function startMultiSearch() {
            const query = document.getElementById('search-query').value.trim();
            if (!query) return;
            initSourcing('/sourcing/api/multisearch', {
                query,
                category: document.getElementById('search-category').value,
                max_retailers: document.getElementById('search-max-retailers').value,
                min_roi: document.getElementById('search-min-roi').value,
                max_price: document.getElementById('search-max-price').value
            });
        }

        async function startSourcing() {
            const url = document.getElementById('source-url').value.trim();
            if (!url) return;
            initSourcing('/sourcing/api/start', {
                url,
                min_roi: document.getElementById('min-roi').value,
                min_profit: document.getElementById('min-profit').value,
                max_products: document.getElementById('max-products').value
            });
        }

        function initSourcing(endpoint, body) {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('progress-area').classList.remove('hidden');
            document.getElementById('sourcing-tbody').innerHTML = '';
            document.getElementById('status-text').textContent = 'Initializing link...';

            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).then(() => {
                eventSource = new EventSource('/sourcing/api/stream');
                eventSource.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'status') {
                        document.getElementById('status-text').textContent = data.message;
                    } else if (data.type === 'product') {
                        renderProduct(data.product);
                    } else if (data.type === 'done') {
                        finishSourcing();
                    }
                };
                eventSource.onerror = () => finishSourcing();
            });
        }

        function renderProduct(p) {
            const tbody = document.getElementById('sourcing-tbody');
            const row = document.createElement('tr');
            row.style.borderBottom = '1px solid var(--glass-border)';
            const verdict = p.roi >= 35 ? 'buy' : (p.roi >= 20 ? 'maybe' : 'skip');
            row.className = 'verdict-' + verdict;
            
            row.innerHTML = `
                <td style="padding: 1.25rem 1rem;">
                    <strong>${p.name}</strong>
                    <div style="font-size: 0.75rem; color: var(--accent); margin-top: 0.25rem;">ASIN: ${p.asin || 'PENDING'}</div>
                </td>
                <td style="padding: 1.25rem 1rem; color: var(--text-secondary);">${p.retailer}</td>
                <td style="padding: 1.25rem 1rem;">$${p.price}</td>
                <td style="padding: 1.25rem 1rem;"><span style="font-weight: 800; color: ${p.roi >= 30 ? 'var(--success)' : 'var(--text-primary)'}">${p.roi}%</span></td>
                <td style="padding: 1.25rem 1rem; font-weight: 700; color: var(--success);">$${p.profit}</td>
                <td style="padding: 1.25rem 1rem; text-align: center;">
                    <div style="font-size: 0.75rem; font-weight: 800; color: ${p.confidence >= 80 ? 'var(--success)' : 'var(--warning)'}">${p.confidence}%</div>
                </td>
                <td style="padding: 1.25rem 1rem; text-align: right;">
                    <span class="badge-${verdict}" style="padding: 0.4rem 1.25rem; font-size: 0.7rem; border-radius: 4px;">${verdict.toUpperCase()}</span>
                </td>
            `;
            tbody.prepend(row);
        }

        function finishSourcing() {
            isRunning = false;
            if (eventSource) eventSource.close();
            document.getElementById('status-text').textContent = 'Operation complete.';
            document.getElementById('export-btn').disabled = false;
        }

        function exportCSV() {
            window.location.href = '/sourcing/api/export';
        }
    </script>
</body>
</html>
